name: ORTHO Resolver (채점 5m)

# ORTHO 가상신호 채점기. 5분마다 Notion의 OPEN 가상신호를 OKX 실제 가격으로
# WIN/LOSS/TIMEOUT 판정한다. 신호 생성과 독립. 알림 ON/OFF와 무관하게 항상 동작.

on:
  workflow_dispatch:

concurrency:
  group: ortho-resolver
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve open paper signals
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ORTHO resolver
        env:
          OKX_API_KEY:        ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET:     ${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE:     ${{ secrets.OKX_PASSPHRASE }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          LOG_LEVEL:          ${{ vars.LOG_LEVEL }}
          # 채점 정합: 생성기와 동일한 본전스톱·보유한도를 써야 라벨이 일관(불일치 시 WIN/LOSS 왜곡).
          ORTHO_BE_TRIGGER_R: ${{ vars.ORTHO_BE_TRIGGER_R }}
          ORTHO_BE_LOCK_R:    ${{ vars.ORTHO_BE_LOCK_R }}
          ORTHO_T_MAX:        ${{ vars.ORTHO_T_MAX }}
          ORTHO_RESOLVER_MAX: ${{ vars.ORTHO_RESOLVER_MAX }}
        run: python src/ortho_resolver.py
