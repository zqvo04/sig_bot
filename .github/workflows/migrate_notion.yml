name: Notion Migrate to ORTHO (기록 전체 삭제)

# 기존 Notion 추적 DB를 ORTHO 양식으로 전환하는 1회성 수동 워크플로우.
#   - 스키마: ORTHO 신규 속성 추가(이미 있으면 스킵). ※ 레거시 컬럼 제거는
#     Notion UI/관리자가 이미 수행한 경우 불필요 — 이 스크립트는 추가만 한다.
#   - 기록: confirm=DELETE 입력 시에만 전체 삭제(archived). 기본은 DRY-RUN.
# 실행: Actions 탭 → 이 워크플로우 → Run workflow → confirm 칸에 DELETE 입력.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '전체 삭제하려면 정확히 DELETE 라고 입력 (그 외에는 미리보기만)'
        required: true
        default: "DRYRUN"

concurrency:
  group: notion-migrate
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate Notion DB
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Run migration (schema + optional wipe)
        env:
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ "${{ github.event.inputs.confirm }}" = "DELETE" ]; then
            echo "⚠️ 전체 삭제 모드"
            python scripts/migrate_notion_to_ortho.py --apply
          else
            echo "ℹ️ DRY-RUN (미리보기). 실제 삭제하려면 confirm=DELETE 로 재실행."
            python scripts/migrate_notion_to_ortho.py
          fi
