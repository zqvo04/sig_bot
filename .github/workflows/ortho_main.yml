name: ORTHO Signal Bot (15m)

# ORTHO-3 단독 가상매매 봇. 15분마다 6심볼을 평가해 Notion에 가상기록하고,
# ALERT_ENABLED=true 일 때만 텔레그램 알림을 보낸다. 실주문 없음.

on:
  workflow_dispatch:

concurrency:
  group: ortho-signal
  cancel-in-progress: false

jobs:
  run:
    name: ORTHO evaluate & record
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ORTHO bot
        env:
          OKX_API_KEY:        ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET:     ${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE:     ${{ secrets.OKX_PASSPHRASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # ── Shadow 로깅(FN 측정) — 별도 DB. 셋 다 있어야 활성(없으면 inert=현행 불변) ──
          NOTION_SHADOW_DB_ID:      ${{ secrets.NOTION_SHADOW_DB_ID }}
          ORTHO_SHADOW_LOG:         ${{ vars.ORTHO_SHADOW_LOG }}
          ORTHO_SHADOW_REASONS:     ${{ vars.ORTHO_SHADOW_REASONS }}
          ORTHO_SHADOW_MAX_PER_RUN: ${{ vars.ORTHO_SHADOW_MAX_PER_RUN }}
          # ── 넓은 조리개(A+B+C) + 유니버스 확장 + 스캘핑 피처 (Shadow 학습/평가) ──
          ORTHO_EXPLORE_SYMBOLS:    ${{ vars.ORTHO_EXPLORE_SYMBOLS }}
          ORTHO_APERTURE_EXPLORE:   ${{ vars.ORTHO_APERTURE_EXPLORE }}
          ORTHO_APERTURE_DELTA:     ${{ vars.ORTHO_APERTURE_DELTA }}
          ORTHO_SCALP_FEATS:        ${{ vars.ORTHO_SCALP_FEATS }}
          ORTHO_OBI_DEPTH:          ${{ vars.ORTHO_OBI_DEPTH }}
          ORTHO_TAKER_SLOPE_LB:     ${{ vars.ORTHO_TAKER_SLOPE_LB }}
          ORTHO_FUNDING_HIST:       ${{ vars.ORTHO_FUNDING_HIST }}
          # ── 텔레그램 알림 ON/OFF ──
          # 학습기간(2주)에는 미설정/false → 알림 OFF, 기록·채점만.
          # 학습 완료 후 Variables 에서 ALERT_ENABLED=true 로 변경 → 알림 ON.
          ALERT_ENABLED:      ${{ vars.ALERT_ENABLED }}
          LOG_LEVEL:          ${{ vars.LOG_LEVEL }}
          SINGLE_SYMBOL:      ${{ vars.SINGLE_SYMBOL }}
          # ── 파라미터 오버라이드 (미설정 시 코드 기본값) ──
          # 가이드 Phase 3 의 단일변수 A/B 노브를 전부 런타임에 연결한다(미설정=빈값→기본값 유지).
          ORTHO_POLARITIES:       ${{ vars.ORTHO_POLARITIES }}
          # 진입 12파라미터
          ORTHO_W_L:              ${{ vars.ORTHO_W_L }}
          ORTHO_P_EXT:            ${{ vars.ORTHO_P_EXT }}
          ORTHO_N_MEAN:           ${{ vars.ORTHO_N_MEAN }}
          ORTHO_W_F:              ${{ vars.ORTHO_W_F }}
          ORTHO_P_FLOW:           ${{ vars.ORTHO_P_FLOW }}
          ORTHO_LS_CROWD_VETO:    ${{ vars.ORTHO_LS_CROWD_VETO }}
          ORTHO_TAKER_VETO:       ${{ vars.ORTHO_TAKER_VETO }}
          ORTHO_SPREAD_MAX_BPS:   ${{ vars.ORTHO_SPREAD_MAX_BPS }}
          ORTHO_SL_ATR_BUF:       ${{ vars.ORTHO_SL_ATR_BUF }}
          ORTHO_RR_MIN:           ${{ vars.ORTHO_RR_MIN }}
          ORTHO_T_MAX:            ${{ vars.ORTHO_T_MAX }}
          ORTHO_MAX_POS_DIR:      ${{ vars.ORTHO_MAX_POS_DIR }}
          # 리스크·집행 레이어
          ORTHO_RISK_PER_TRADE:   ${{ vars.ORTHO_RISK_PER_TRADE }}
          ORTHO_BE_TRIGGER_R:     ${{ vars.ORTHO_BE_TRIGGER_R }}
          ORTHO_BE_LOCK_R:        ${{ vars.ORTHO_BE_LOCK_R }}
          ORTHO_MAX_CONCURRENT_DIR: ${{ vars.ORTHO_MAX_CONCURRENT_DIR }}
          ORTHO_RR_MAX:           ${{ vars.ORTHO_RR_MAX }}
          # 레짐 라우터(R1) + 도달가능 TP(R2) + R4~R6
          ORTHO_REGIME_ROUTER:    ${{ vars.ORTHO_REGIME_ROUTER }}
          ORTHO_VOL_HI:           ${{ vars.ORTHO_VOL_HI }}
          ORTHO_TREND_ER:         ${{ vars.ORTHO_TREND_ER }}
          ORTHO_TP_REACH_K:       ${{ vars.ORTHO_TP_REACH_K }}
          ORTHO_P_VOL:            ${{ vars.ORTHO_P_VOL }}
          ORTHO_CHASE_K:          ${{ vars.ORTHO_CHASE_K }}
          ORTHO_CORR_DEDUP:       ${{ vars.ORTHO_CORR_DEDUP }}
          # 신규 토글(L2 SOFT 라우터 / L3 돌파부활 / L4 흐름보강) — 기본 STRICT/OFF=현행 보존
          ORTHO_ROUTER_MODE:      ${{ vars.ORTHO_ROUTER_MODE }}
          ORTHO_ROUTER_SOFT_ER:   ${{ vars.ORTHO_ROUTER_SOFT_ER }}
          ORTHO_BREAKOUT_RANGE:   ${{ vars.ORTHO_BREAKOUT_RANGE }}
          ORTHO_N_5M_FETCH:       ${{ vars.ORTHO_N_5M_FETCH }}
          ORTHO_FLOW_TAKER_CONFIRM: ${{ vars.ORTHO_FLOW_TAKER_CONFIRM }}
          ORTHO_FLOW_TAKER_MIN:   ${{ vars.ORTHO_FLOW_TAKER_MIN }}
          # 분류기 지연제거(MACRO_FRESH) — 상위TF fast-EMA 기울기 거부권. ★ 기본 ON(미설정 시 코드 기본 true)
          ORTHO_MACRO_FRESH:      ${{ vars.ORTHO_MACRO_FRESH }}
          ORTHO_MACRO_FRESH_LB:   ${{ vars.ORTHO_MACRO_FRESH_LB }}
          # 흐름-끝물 진입 차단(FLOW_FLOOR) — SHORT&F<15 누수 차단. ★ SHORT측 기본 ON(미설정 시 15). 0=OFF, LONG미러=CEIL>0
          ORTHO_FLOW_FLOOR_PCT:   ${{ vars.ORTHO_FLOW_FLOOR_PCT }}
          ORTHO_FLOW_CEIL_PCT:    ${{ vars.ORTHO_FLOW_CEIL_PCT }}
        run: python src/ortho_main.py
